<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>EPIC Proposal Generator</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/print.css">

</head>

<body>

<div class="container-fluid">

<div class="row vh-100">

    <!-- ===========================
         LEFT PANEL
    ============================ -->

    <div class="col-lg-4 bg-white border-end p-4 sidebar">

        <h3 class="fw-bold text-danger mb-4">
            EPIC Proposal Generator
        </h3>

        <!-- Customer -->

        <div class="card shadow-sm mb-4">

            <div class="card-header fw-bold">

                Customer Information

            </div>

            <div class="card-body">

                <div class="mb-3">
                    <label class="form-label">Customer Name</label>
                    <input class="form-control" id="customerName">
                </div>

                <div class="mb-3">
                    <label class="form-label">Address</label>
                    <textarea class="form-control" id="customerAddress" rows="3"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Contact Person</label>
                    <input class="form-control" id="contactPerson">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input class="form-control" id="customerEmail">
                </div>

                <div class="mb-3">
                    <label class="form-label">Telephone</label>
                    <input class="form-control" id="telephone">
                </div>

            </div>

        </div>

        <!-- Proposal -->

        <div class="card shadow-sm mb-4">

            <div class="card-header fw-bold">

                Proposal Details

            </div>

            <div class="card-body">

                <div class="mb-3">

                    <label class="form-label">Proposal Date</label>

                    <input type="date"
                           class="form-control"
                           id="proposalDate">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Proposal Number

                    </label>

                    <input class="form-control"
                           id="proposalNumber">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Customer Reference

                    </label>

                    <input class="form-control"
                           id="customerReference">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Subject

                    </label>

                    <input class="form-control"
                           id="subject">

                </div>

            </div>

        </div>

        <!-- Buttons -->

        <div class="d-grid gap-2">

            <button class="btn btn-primary btn-lg">

                Preview

            </button>

            <button class="btn btn-success btn-lg">

                Print PDF

            </button>

        </div>

    </div>

    <!-- ===========================
         RIGHT PANEL
    ============================ -->

    <div class="col-lg-8 bg-light overflow-auto p-5">

        <div class="paper">

            <div class="text-center py-5">

                <h2 class="text-danger">

                    EPIC Proposal Generator

                </h2>

                <p class="text-muted">

                    Proposal Preview

                </p>

                <hr>

                <p>

                    This area will become your
                    exact two-page proposal preview.

                </p>

                <p>

                    Every value entered on the left
                    will automatically appear here.

                </p>

            </div>

        </div>

    </div>

</div>

</div>

<script src="js/app.js"></script>

</body>

</html>
